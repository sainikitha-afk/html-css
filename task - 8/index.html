<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 8 - Accordion</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>CSS Accordion</h1>

    <div class="accordion">

        <div class="item">
            <input type="checkbox" id="item1">
            <label for="item1">HTML Basics</label>
            <div class="content">
                <p>HTML structures web pages using semantic elements.</p>
            </div>
        </div>

        <div class="item">
            <input type="checkbox" id="item2">
            <label for="item2">CSS Styling</label>
            <div class="content">
                <p>CSS styles layouts using colors, spacing, and positioning.</p>
            </div>
        </div>

        <div class="item">
            <input type="checkbox" id="item3">
            <label for="item3">Responsive Design</label>
            <div class="content">
                <p>Media queries help adapt layouts for different devices.</p>
            </div>
        </div>

    </div>

</body>
</html>
